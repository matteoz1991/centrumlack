<!DOCTYPE html>
<html lang="sv" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleri | Centrumlack</title>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS Inlined -->
    <style>
        :root { --bg-dark:#0f172a; --bg-darker:#020617; --brand-red:#dc2626; --brand-red-hover:#b91c1c; --brand-blue:#0f172a; --text-light:#f8fafc; --text-muted:#94a3b8; --glass:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08); --font-main:'Inter',sans-serif; --transition:all 0.4s cubic-bezier(0.16,1,0.3,1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-family:var(--font-main); }
        body { background-color:#fff; color:#1e293b; line-height:1.6; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
        .container { max-width:1280px; margin:0 auto; padding:0 1.5rem; }
        .section-padding { padding:7rem 0; }
        h1, h2, h3, h4 { font-weight:800; line-height:1.2; }
        .highlight-red { color:var(--brand-red); }
        .navbar { position:fixed; top:0; width:100%; height:120px; z-index:1000; background:rgba(2,6,23,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); transition:var(--transition); display:flex; align-items:center; }
        .navbar.scrolled { background:rgba(2,6,23,0.98); box-shadow:0 10px 30px rgba(0,0,0,0.3); }
        .nav-logo { height:100px; width:auto; max-width:100%; margin-right:4rem; transition:var(--transition); }
        #mobile-menu-btn { display:none; background:none; border:none; color:white; cursor:pointer; }
        @media (max-width:768px) { .navbar { height:140px; } .nav-logo { height:110px; margin-top:0; margin-left:-1rem; max-width:80vw; object-fit:contain; } #mobile-menu-btn { display:block; } }
        .nav-content { display:flex; justify-content:space-between; align-items:center; }
        .nav-links { display:flex; gap:2.5rem; align-items:center; list-style:none; }
        .nav-links a { color:white; text-decoration:none; font-weight:700; font-size:0.95rem; transition:var(--transition); }
        .nav-links a:hover { color:var(--brand-red); }
        .btn { display:inline-flex; align-items:center; gap:0.75rem; padding:1rem 2rem; border-radius:12px; font-weight:800; text-decoration:none; transition:var(--transition); cursor:pointer; border:none; font-size:1rem; }
        .btn-primary { background:var(--brand-red); color:white; box-shadow:0 4px 20px rgba(220,38,38,0.3); }
        .btn-outline { background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); backdrop-filter:blur(8px); }
        .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:2.5rem; }
        @media (max-width:1024px) { .grid-3 { grid-template-columns:repeat(2,1fr); } }
        @media (max-width:768px) { .grid-3 { grid-template-columns:1fr; } .nav-links { display:none; } .section-padding { padding:4rem 0; } }
        .gallery-card { background:white; padding:12px; border:1px solid var(--brand-red); border-radius:24px; transition:var(--transition); overflow:hidden; box-shadow:0 10px 30px rgba(220,38,38,0.08); }
        .gallery-card .img-container { aspect-ratio:1; overflow:hidden; border-radius:16px; width:100%; }
        .gallery-card img { width:100%; height:100%; object-fit:cover; transition:transform 0.8s cubic-bezier(0.16,1,0.3,1); }
        .footer-logo { height:160px; width:auto; max-width:100%; filter:grayscale(1); opacity:0.5; transition:var(--transition); }
        .footer-logo:hover { filter:grayscale(0); opacity:1; transform:scale(1.05); }
        @media (max-width:768px) { .footer-logo { height:100px; } }
        .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; display:none; align-items:center; justify-content:center; opacity:0; transition:opacity 0.4s ease; }
        .lightbox.active { display:flex; opacity:1; }
        .lightbox-close { position:absolute; top:2rem; right:2rem; color:white; font-size:2.5rem; background:none; border:none; cursor:pointer; }
    </style>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body style="background: #f8fafc;">

    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html#home" class="logo flex items-center">
                <img src="assets/logga1.png" alt="Centrumlack" width="1920" height="1080" class="nav-logo logo-glow transition-transform hover:scale-105">
            </a>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#home">Hem</a></li>
                    <li><a href="index.html#services">Tjänster</a></li>
                    <li><a href="index.html#gallery" class="highlight-red">Galleri</a></li>
                    <li><a href="index.html#about">Om oss</a></li>
                    <li><a href="index.html#contact" class="btn btn-primary" style="padding: 0.6rem 1.5rem;">Kontakta Oss</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="section-padding" style="padding-top: 8rem;">
        <div class="container">
            <div style="text-align: center; margin-bottom: 5rem;">
                <p style="color: var(--brand-red); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">Projektarkiv</p>
                <h1 style="font-size: 3.5rem; color: var(--bg-dark);">Vårt Galleri</h1>
                <p style="max-width: 600px; margin: 1.5rem auto; color: #64748b; font-weight: 500; font-size: 1.25rem;">
                    Här samlar vi bilder från våra senaste uppdrag. Se resultaten av professionell billackering och plåtreparationer.
                </p>
            </div>
            
            <!-- Gallery Grid Template -->
            <div id="gallery-grid" class="grid-3" style="gap: 2rem;">
                <!-- Dynamically Populated -->
            </div>
            
            <div style="text-align: center; margin-top: 5rem;">
                <a href="index.html#home" class="btn btn-outline" style="color: var(--bg-dark); border-color: #cbd5e1;">
                    <i data-lucide="arrow-left"></i> Tillbaka till startsidan
                </a>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="close-lightbox">
            <i data-lucide="x"></i>
        </button>
        <button id="prev-btn" style="position: absolute; left: 2rem; color: white; background: none; border: none; cursor: pointer; font-size: 3rem;">
            <i data-lucide="chevron-left" class="w-12 h-12"></i>
        </button>
        <div style="max-width: 90%; max-height: 85vh; display: flex; align-items: center; justify-content: center;">
            <img id="lightbox-img" src="" alt="Enlarged" style="max-width: 100%; max-height: 100%; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5);">
        </div>
        <button id="next-btn" style="position: absolute; right: 2rem; color: white; background: none; border: none; cursor: pointer; font-size: 3rem;">
            <i data-lucide="chevron-right" class="w-12 h-12"></i>
        </button>
    </div>

    <footer style="background: #020617; padding: 5rem 0; border-top: 1px solid var(--border); color: white;">
        <div class="container" style="text-align: center;">
            <p style="color: #64748b;">&copy; 2026 Centrumlack. Alla rättigheter förbehållna.</p>
        </div>
    </footer>

    <script>
        // Gallery Auto-Population & Lightbox Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('gallery-grid');
            // Robust image list (Hardcoded to avoid fetch/CORS issues)
            const images = [
                "0461d37a-6c69-4ee3-b0cd-a8f5c05e8283.jpg",
                "0af2cc81-adca-4ce8-bc8c-e21aa36789b7.jpg",
                "0fbabf30-5a33-4285-b611-1ed11fb593cd (1).jpg",
                "0fbabf30-5a33-4285-b611-1ed11fb593cd.jpg",
                "1aa6263a-0f87-4c7f-a342-8af4c26db5e7 (1).jpg",
                "1aa6263a-0f87-4c7f-a342-8af4c26db5e7.jpg",
                "250c2445-8d68-41d4-9f31-19713ce4a512.jpg",
                "323f4e46-942d-46f0-8cdf-d0a613947941 (1).jpg",
                "323f4e46-942d-46f0-8cdf-d0a613947941.jpg",
                "387db898-1b1a-4fb8-9beb-0382fc4ee0de.jpg",
                "3acb7295-4d91-4f26-971b-49766f90576b.jpg",
                "3e1b98c9-afba-4442-8816-0be67f229887.jpg",
                "3f6dd0b8-d422-4aa7-b53c-999eb55087c1.jpg",
                "439fd59e-27cc-468e-b764-d76f92509151.jpg",
                "45fef2e8-ab74-4ed6-9cc2-18fadbcc579f.jpg",
                "4d6895fc-612b-4d29-aaaf-7c4f1450838b.jpg",
                "505fb96b-1ba8-4488-a1e8-3102e54f8931.jpg",
                "5242d715-48d9-4364-991b-cbcf9c6988dc.jpg",
                "56abe001-0cb4-488a-83df-4b1b0d8fcef7.jpg",
                "6509bccf-bec1-46aa-abca-8dd3b4320467.jpg",
                "684b03b4-b070-492b-be0e-52165439544e.jpg",
                "6a22e7ea-4cf4-42b9-b7dc-7acce8a31b4c.jpg",
                "6ee66731-7244-4faf-bb93-8655acb01416.jpg",
                "6fcddc8d-2782-45c8-acad-5871a777dde0.jpg",
                "745cdd70-5d8e-43f8-ba45-c5883b7cc202.jpg",
                "75b9ec4a-6da2-40e3-a959-604aaaa6c334 (1).jpg",
                "75b9ec4a-6da2-40e3-a959-604aaaa6c334.jpg",
                "852d667b-d445-4fcd-8973-eec97cfad8f3.jpg",
                "86529410-f219-4d08-8f67-4cf724c24d51.jpg",
                "bc20e9a4-dd21-434a-a027-18d0d148cda1.jpg",
                "c8769120-d0c4-4933-b0f7-afeecddcb59e.jpg",
                "ca368a40-803a-4b4e-98d4-cf9f8a3b5dd3.jpg",
                "cffe21a4-b1af-4503-a6fe-8ec437f2b1ee.jpg",
                "d3aa62fe-9e7b-4bed-b0e5-16f43c13a01a.jpg",
                "ef668796-e39c-4e91-b49d-7f2d3d65f319.jpg",
                "f130c74e-c1c4-4be8-81d7-1e5e2cd21ae0.jpg",
                "f9f59b84-eaf5-4fa0-88f4-734e95bcefeb.jpg",
                "fc427162-5af6-4d16-8f5e-2ad89f7877b9.jpg",
                "fe99bd92-c9d4-460b-8f81-8bacfacfcd88.jpg"
            ];

            // Clear grid
            grid.innerHTML = '';

            // Populate Grid
            images.forEach((imgSrc, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div class="img-container" style="background: #e2e8f0;">
                        <img src="assets/galleri/${imgSrc}" alt="Centrumlack Projekt" width="800" height="800" loading="lazy">
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (window.openLightbox) openLightbox(index);
                });
                grid.appendChild(card);
            });
            console.log('Gallery: Population complete.');

            // Lightbox Logic
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            let currentIndex = 0;

            function openLightbox(index) {
                currentIndex = index;
                lightboxImg.src = `assets/galleri/${images[currentIndex]}`;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            document.getElementById('close-lightbox').addEventListener('click', closeLightbox);
            
            document.getElementById('prev-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                lightboxImg.src = `assets/galleri/${images[currentIndex]}`;
            });

            document.getElementById('next-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                currentIndex = (currentIndex + 1) % images.length;
                lightboxImg.src = `assets/galleri/${images[currentIndex]}`;
            });

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
                if (e.key === 'ArrowLeft') document.getElementById('prev-btn').click();
            });

            if (window.lucide) window.lucide.createIcons();
        });
    </script>
</body>
</html>
